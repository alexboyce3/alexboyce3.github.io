# Site settings
title: Alex Boyce
author: Alex Boyce
description: "figuring it out"
baseurl: ""
date_format: "%b %-d, %Y"
theme: minima

# Optional features
show_related_posts: True
show_post_footers: True
show_subscribe_cta: True
show_social_icons: false
ajaxify_contact_form: false
enable_mathjax: false
extended_fonts: false
enable_anchorjs: true

# Social icons
github_username: alexboyce3
stackoverflow_id:
twitter_username:
linkedin_username:

text:
  pagination:
    newer: "Newer"
    older: "Older"
  post:
    updated: "Updated"
  index:
    coming_soon: "Coming soon..."
  og_locale: "en_US"

# Build settings
markdown: kramdown
redcarpet:
  extensions: ["smart", "tables", "with_toc_data", "footnotes"]
permalink: pretty
paginate: 12
paginate_path: "/blog/:num/"
sass:
  compressed: true
plugins:
  - jekyll-paginate
  - jekyll-sitemap
exclude: [vendor]

collections_dir: collections
collections:
  reviews:
    output: true
  portfolio:
    output: true